<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Deals Hub - Lead Developer Werewolf3788</title>
    <style>
        /* CSS Standards: Mobile Responsive & Centered */
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0; padding: 0;
            background: #121212;
            transition: background 1.5s ease-in-out;
            min-height: 100vh;
            display: flex; justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Mandatory Centered Wrapper for Lead Developer Werewolf3788 */
        #wp-custom-wrapper {
            width: 90%; 
            max-width: 1200px; 
            margin: 20px auto;
            background: transparent;
            color: #eee;
            display: flex; flex-direction: column; align-items: center;
            z-index: 10;
        }

        #site-header {
            width: 100%; text-align: center; padding: 30px; 
            border-radius: 20px; margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Category Filter Controls */
        .controls-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            width: 100%;
        }

        #category-select, .shuffle-btn {
            padding: 12px 20px;
            font-size: 1rem;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            outline: none;
            transition: 0.2s;
        }

        #category-select { width: 100%; max-width: 280px; }
        #category-select option { background: #222; color: #fff; }
        .shuffle-btn:hover { background: rgba(255, 255, 255, 0.2); }

        /* GRID LAYOUT: Side-by-Side */
        .deals-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 25px; 
            width: 100%; 
        }
        
        .deal-box {
            display: flex; 
            flex-direction: column; 
            align-items: center;
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.12); 
            border-radius: 15px;
            padding: 20px; 
            transition: 0.4s ease;
            text-align: center;
        }

        .deal-box.hidden { display: none; }

        /* --- DYNAMIC MODE HIGHLIGHTS --- */

        body.cod-mode .deal-box.match-highlight { border: 2px solid #9ef01a; animation: glitchBorder 1.5s infinite; }
        @keyframes glitchBorder { 0% { box-shadow: 0 0 10px #9ef01a; } 50% { box-shadow: 2px -2px 15px #38b000, -2px 2px 15px #9ef01a; } 100% { box-shadow: 0 0 10px #9ef01a; } }
        body.wot-mode .deal-box.match-highlight { border: 2px solid #8b9467; box-shadow: 0 0 20px rgba(139, 148, 103, 0.5); }
        body.swat-mode .deal-box.match-highlight { animation: swatStrobe 0.5s infinite alternate; border-width: 2px; }
        @keyframes swatStrobe { 0% { border-color: #1a237e; box-shadow: 0 0 15px rgba(26, 35, 126, 0.7); } 100% { border-color: #d32f2f; box-shadow: 0 0 10px rgba(211, 47, 47, 0.5); } }
        body.racing-mode .deal-box.match-highlight { animation: policeFlash 0.8s infinite alternate; border-width: 2px; }
        @keyframes policeFlash { 0% { border-color: #ff0000; box-shadow: 0 0 15px rgba(255, 0, 0, 0.6); } 100% { border-color: #0000ff; box-shadow: 0 0 15px rgba(0, 255, 0, 0.6); } }
        body.farming-mode .deal-box.match-highlight { border: 2px solid #ffde00; box-shadow: 0 0 20px #ffde0066; }
        body.hunting-mode .deal-box.match-highlight { border: 2px solid #355e3b; box-shadow: 0 0 20px #355e3b66; }
        body.fishing-mode .deal-box.match-highlight { border: 2px solid #0077be; box-shadow: 0 0 20px #0077be66; }

        /* --- DYNAMIC THEMES & CURSORS --- */
        body.cod-mode { background: linear-gradient(180deg, #0a0f02 0%, #000 100%); cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><circle cx="16" cy="16" r="2" fill="%23ff0000"/><circle cx="16" cy="16" r="14" stroke="%239ef01a" stroke-width="1" fill="none"/></svg>'), auto; }
        body.wot-mode { background: linear-gradient(180deg, #3d4432 0%, #000 100%); cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><circle cx="16" cy="16" r="14" stroke="%238b9467" stroke-width="2" fill="none"/><line x1="16" y1="2" x2="16" y2="30" stroke="%238b9467"/><line x1="2" y1="16" x2="30" y2="16" stroke="%238b9467"/></svg>'), auto; }
        body.swat-mode { background: linear-gradient(180deg, #0d1117 0%, #000 100%); cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><circle cx="16" cy="16" r="2" fill="%23ff0000"/><circle cx="16" cy="16" r="14" stroke="%23333" stroke-width="1" fill="none"/></svg>'), auto; }
        body.racing-mode { background: linear-gradient(180deg, #1a1a1a 0%, #000 100%); cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><text x="0" y="24" font-size="24">🏎️</text></svg>'), auto; }
        body.farming-mode { background: linear-gradient(180deg, #367c2b 0%, #1a3a16 100%); cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><text x="0" y="24" font-size="24">🚜</text></svg>'), auto; }
        body.farming-mode::before { content: ""; position: fixed; bottom: 0; left: 0; width: 100%; height: 180px; background: url('https://www.transparenttextures.com/patterns/grass.png'); opacity: 0.25; pointer-events: none; }
        body.hunting-mode { background: linear-gradient(180deg, #1b3022 0%, #000 100%); cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><circle cx="16" cy="16" r="12" stroke="%23355e3b" stroke-width="1" fill="none"><animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite" /></circle><line x1="16" y1="2" x2="16" y2="30" stroke="%23355e3b"/><line x1="0" y1="16" x2="32" y2="16" stroke="%23355e3b"/></svg>'), auto; }
        body.fishing-mode { background: linear-gradient(180deg, #001f3f 0%, #000 100%); cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><circle cx="16" cy="16" r="10" stroke="%230077be" stroke-width="2" fill="none" opacity="0.6"><animate attributeName="r" from="10" to="15" dur="1s" repeatCount="indefinite" /><animate attributeName="opacity" from="0.6" to="0" dur="1s" repeatCount="indefinite" /></circle></svg>'), auto; }

        .game-pop { position: fixed; font-size: 3rem; opacity: 0; transition: opacity 1s; pointer-events: none; z-index: 9999; }

        .deal-image-container { 
            width: 100%; max-width: 220px; aspect-ratio: 1/1; margin-bottom: 15px; 
            border-radius: 10px; background: #fff; display: flex; align-items: center; 
            justify-content: center; padding: 15px; overflow: hidden; 
        }
        .deal-image-container img { width: 100%; height: 100%; object-fit: contain; }
        
        .deal-info { width: 100%; margin-bottom: 15px; }
        .deal-title { font-size: 1.1rem; margin: 0 0 10px 0; color: #fff; font-weight: bold; }
        .deal-desc { font-size: 0.9rem; color: #ccc; margin: 0; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        .buy-btn { background: #ff9900; color: #111; text-decoration: none; padding: 12px 20px; font-weight: bold; border-radius: 8px; width: 100%; transition: 0.2s; }
        .buy-btn:hover { background: #e68a00; }

        @media (max-width: 900px) { .deals-grid { gap: 15px; } }
        @media (max-width: 650px) { .deals-grid { grid-template-columns: 1fr; } .deal-box { padding: 25px 20px; } .deal-image-container { max-width: 250px; } }
    </style>
</head>
<body id="main-body">

<div id="wp-custom-wrapper">
    <div id="site-header">
        <h1>Amazon Clearance Picks</h1>
        <p id="live-status">Syncing Operator Intel...</p>
    </div>

    <!-- Category Dropdown and Shuffle -->
    <div class="controls-row">
        <select id="category-select">
            <option value="all">View All Categories</option>
        </select>
        <button class="shuffle-btn" onclick="loadDeals()">🎲 Reshuffle</button>
    </div>

    <div class="deals-grid" id="amazon-deals-target">
        <p style="text-align:center;">Deploying tactical inventory...</p>
    </div>
</div>

<script>
    const TWITCH_USER = "Werewolf3788"; 
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTFygWPIyqmgu02ImqUERdgBLcQ5jPSEgxQuqumbiKOVe4YX7bzawxLBGEi7okVKlak9JTWDvb9bUcf/pub?gid=0&single=true&output=csv";
    
    let currentPlayedGame = ""; 

    function spawnEquipment() {
        const body = document.body;
        let equipment = [];
        if (body.classList.contains('farming-mode')) equipment = ['🚜', '🌾', '🌱', '🌽', '🌻'];
        if (body.classList.contains('wot-mode')) equipment = ['🛡️', '⚙️', '📻', '🛠️', '🚛'];
        if (body.classList.contains('cod-mode')) equipment = ['🎧', '🎮', '🔋', '📦', '🎯'];
        if (body.classList.contains('swat-mode')) equipment = ['🛡️', '🔦', '📻', '👞', '🚨'];
        if (body.classList.contains('racing-mode')) equipment = ['🏎️', '🏁', '🚦', '🔧', '⛽'];
        if (body.classList.contains('hunting-mode')) equipment = ['🏹', '🦌', '🌲', '🔭', '🏕️'];
        if (body.classList.contains('fishing-mode')) equipment = ['🎣', '🐟', '🛶', '⚓', '🌊'];
        if (equipment.length === 0) return;
        const el = document.createElement('div');
        el.className = 'game-pop';
        el.innerText = equipment[Math.floor(Math.random() * equipment.length)];
        el.style.left = Math.random() * 90 + 'vw';
        el.style.top = Math.random() * 90 + 'vh';
        document.body.appendChild(el);
        setTimeout(() => el.style.opacity = '0.4', 100);
        setTimeout(() => el.style.opacity = '0', 3000);
        setTimeout(() => el.remove(), 4500);
    }

    async function checkTwitchMode() {
        try {
            const res = await fetch(`https://decapi.me/twitch/game/${TWITCH_USER}`);
            const game = (await res.text()).trim();
            currentPlayedGame = game; 
            const gameLower = game.toLowerCase();
            const body = document.getElementById('main-body');
            const status = document.getElementById('live-status');
            body.className = ''; 

            if (gameLower.includes("call of duty") || gameLower.includes("warzone") || gameLower.includes("mw3")) {
                body.classList.add("cod-mode");
                status.innerHTML = `🔫 COD MODE: ${game.toUpperCase()}`;
            } else if (gameLower.includes("world of tanks")) {
                body.classList.add("wot-mode");
                status.innerHTML = `🛡️ WORLD OF TANKS: ${game.toUpperCase()}`;
            } else if (gameLower.includes("ready or not")) {
                body.classList.add("swat-mode");
                status.innerHTML = `🛡️ SWAT MODE: ${game.toUpperCase()}`;
            } else if (gameLower.includes("need for speed") || gameLower.includes("racing") || gameLower.includes("driving")) {
                body.classList.add("racing-mode");
                status.innerHTML = `🏎️ RACING MODE: ${game.toUpperCase()}`;
            } else if (gameLower.includes("farming") || gameLower.includes("simulator")) {
                body.classList.add("farming-mode");
                status.innerHTML = `🚜 FARMING MODE: ${game.toUpperCase()}`;
            } else if (gameLower.includes("angler")) {
                body.classList.add("fishing-mode");
                status.innerHTML = `🎣 FISHING: ${game.toUpperCase()}`;
            } else if (gameLower.includes("hunter") || gameLower.includes("hunting")) {
                body.classList.add("hunting-mode");
                status.innerHTML = `🎯 HUNTING: ${game.toUpperCase()}`;
            } else {
                status.innerHTML = "Real-Time Community Deals";
            }
            loadDeals();
        } catch (e) { status.innerHTML = "Amazon Affiliate Hub"; }
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    async function loadDeals() {
        try {
            const response = await fetch(SHEET_URL);
            const csvData = await response.text();
            const rows = csvData.split('\n').filter(r => r.trim() !== "").slice(1);
            const shuffledRows = shuffleArray([...rows]);
            
            let htmlContent = "";
            let categories = new Set();
            const select = document.getElementById('category-select');
            const currentFilter = select.value;

            const keywords = {
                cod: ["headset", "controller", "fps", "gaming mouse", "monitor", "mic"],
                wot: ["tank", "armor", "steel", "radio", "camouflage", "model"],
                swat: ["tactical", "swat", "vest", "helmet", "boots", "flashlight"],
                race: ["racing", "car", "speed", "tire", "engine"],
                farm: ["farm", "tractor", "supply", "almanac", "harvest"],
                hunt: ["hunting", "ammo", "gun", "camouflage"],
                fish: ["fishing", "angler", "boat"]
            };

            const activeGameLower = currentPlayedGame.toLowerCase();

            shuffledRows.forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 3) {
                    let title = cols[0].replace(/"/g, "").trim();
                    let desc = cols[1].replace(/"/g, "").trim();
                    let url = cols[2].replace(/"/g, "").trim();
                    let img = cols[3]?.replace(/"/g, "").trim() || "https://placehold.co/150";
                    let tag = cols[4]?.replace(/"/g, "").trim() || "werewolf3788-20";

                    categories.add(tag);

                    let content = (title + " " + desc).toLowerCase();
                    let isMatch = false;
                    const body = document.getElementById('main-body');
                    
                    if (activeGameLower && content.includes(activeGameLower)) {
                        isMatch = true;
                    } else {
                        if (body.classList.contains('cod-mode')) isMatch = keywords.cod.some(k => content.includes(k));
                        if (body.classList.contains('wot-mode')) isMatch = keywords.wot.some(k => content.includes(k));
                        if (body.classList.contains('swat-mode')) isMatch = keywords.swat.some(k => content.includes(k));
                        if (body.classList.contains('racing-mode')) isMatch = keywords.race.some(k => content.includes(k));
                        if (body.classList.contains('farming-mode')) isMatch = keywords.farm.some(k => content.includes(k));
                        if (body.classList.contains('hunting-mode')) isMatch = keywords.hunt.some(k => content.includes(k));
                        if (body.classList.contains('fishing-mode')) isMatch = keywords.fish.some(k => content.includes(k));
                    }

                    let finalUrl = url.includes('?') ? `${url}&tag=${tag}` : `${url}?tag=${tag}`;
                    
                    // Render html but control visibility based on filter
                    let isHidden = (currentFilter !== 'all' && tag !== currentFilter) ? 'hidden' : '';

                    htmlContent += `<div class="deal-box ${isMatch ? 'match-highlight' : ''} ${isHidden}" data-tag="${tag}">
                        <div class="deal-image-container"><img src="${img}" alt="${title}"></div>
                        <div class="deal-info"><h2 class="deal-title">${title}</h2><p class="deal-desc">${desc}</p></div>
                        <a href="${finalUrl}" target="_blank" class="buy-btn">View Deal</a>
                    </div>`;
                }
            });

            // Update dropdown if it only has the default option
            if (select.options.length === 1) {
                Array.from(categories).sort().forEach(cat => {
                    const opt = document.createElement('option');
                    opt.value = cat;
                    opt.innerHTML = cat.replace("-20", "").toUpperCase();
                    select.appendChild(opt);
                });
            }

            document.getElementById('amazon-deals-target').innerHTML = htmlContent;
        } catch (e) { console.log("Inventory error."); }
    }

    // Dropdown change logic
    document.getElementById('category-select').addEventListener('change', (e) => {
        const val = e.target.value;
        document.querySelectorAll('.deal-box').forEach(box => {
            if (val === 'all') {
                box.classList.remove('hidden');
            } else {
                box.classList.toggle('hidden', box.getAttribute('data-tag') !== val);
            }
        });
    });

    window.onload = async () => {
        await checkTwitchMode();
        setInterval(spawnEquipment, 5000);
        setInterval(checkTwitchMode, 300000);
    };
</script>
</body>
</html>
