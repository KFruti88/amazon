<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Deals Hub</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0; padding: 0;
            background: #121212;
            transition: background 1.5s ease-in-out;
            min-height: 100vh;
            display: flex; justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Mandatory Centered Wrapper at 90% Width */
        #wp-custom-wrapper {
            width: 90%; 
            max-width: 1000px;
            margin: 20px auto;
            background: transparent;
            color: #eee;
            display: flex; flex-direction: column; align-items: center;
            z-index: 10;
        }

        #site-header {
            width: 100%; text-align: center; padding: 30px; 
            border-radius: 20px; margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .deals-grid { display: flex; flex-direction: column; gap: 20px; width: 100%; }
        
        .deal-box {
            display: flex; flex-direction: row; align-items: center;
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 15px;
            padding: 20px; transition: 0.4s ease; width: 100%;
        }

        /* --- MODE-SPECIFIC BOX HIGHLIGHTS --- */

        /* Racing Mode: Police Flash Effect */
        body.racing-mode .deal-box.match-highlight { 
            animation: policeFlash 0.8s infinite alternate;
            border-width: 2px;
        }

        @keyframes policeFlash {
            0% { border-color: #ff0000; box-shadow: 0 0 15px rgba(255, 0, 0, 0.6); }
            100% { border-color: #0000ff; box-shadow: 0 0 15px rgba(0, 0, 255, 0.6); }
        }

        /* Standard Mode Highlights */
        body.farming-mode .deal-box.match-highlight { border: 2px solid #ffde00; box-shadow: 0 0 20px rgba(255, 222, 0, 0.4); }
        body.hunting-mode .deal-box.match-highlight { border: 2px solid #355e3b; box-shadow: 0 0 20px rgba(53, 94, 59, 0.4); }
        body.fishing-mode .deal-box.match-highlight { border: 2px solid #0077be; box-shadow: 0 0 20px rgba(0, 119, 190, 0.4); }

        /* --- DYNAMIC THEMES --- */

        body.racing-mode {
            background: linear-gradient(180deg, #1a1a1a 0%, #000 100%);
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><text x="0" y="24" font-size="24">🏎️</text></svg>'), auto;
        }

        body.farming-mode {
            background: linear-gradient(180deg, #367c2b 0%, #1a3a16 100%);
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><text x="0" y="24" font-size="24">🚜</text></svg>'), auto;
        }

        body.hunting-mode {
            background: linear-gradient(180deg, #1b3022 0%, #000 100%);
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><circle cx="16" cy="16" r="12" stroke="%23355e3b" stroke-width="1" fill="none"><animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite" /></circle><line x1="16" y1="0" x2="16" y2="32" stroke="%23355e3b"/><line x1="0" y1="16" x2="32" y2="16" stroke="%23355e3b"/></svg>'), auto;
        }

        body.fishing-mode {
            background: linear-gradient(180deg, #001f3f 0%, #000 100%);
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><circle cx="16" cy="16" r="10" stroke="%230077be" stroke-width="2" fill="none" opacity="0.6"><animate attributeName="r" from="10" to="15" dur="1s" repeatCount="indefinite" /></circle></svg>'), auto;
        }

        .farm-pop { position: fixed; font-size: 3rem; opacity: 0; transition: opacity 1s; pointer-events: none; z-index: 1; }

        .deal-image-container {
            width: 140px; aspect-ratio: 1 / 1; margin-right: 20px;
            flex-shrink: 0; border-radius: 10px; background: #fff;
            display: flex; align-items: center; justify-content: center; padding: 10px;
        }
        .deal-image-container img { width: 100%; height: 100%; object-fit: contain; }
        .deal-info { flex: 1; padding-right: 20px; }
        .buy-btn { background: #ff9900; color: #111; text-decoration: none; padding: 12px 25px; font-weight: bold; border-radius: 8px; white-space: nowrap; }

        @media (max-width: 768px) { 
            .deal-box { flex-direction: column; text-align: center; } 
            .deal-image-container { margin: 0 0 20px 0; width: 180px; height: 180px; }
            .buy-btn { width: 100%; margin-top: 10px; }
        }
    </style>
</head>
<body id="main-body">

<div id="wp-custom-wrapper">
    <div id="site-header">
        <h1>Amazon Clearance Picks</h1>
        <p id="live-status">Syncing Twitch Status...</p>
    </div>
    <div class="deals-grid" id="amazon-deals-target">
        <p style="text-align:center;">Scanning inventory...</p>
    </div>
</div>

<script>
    const TWITCH_USER = "werewolf3788"; //
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTFygWPIyqmgu02ImqUERdgBLcQ5jPSEgxQuqumbiKOVe4YX7bzawxLBGEi7okVKlak9JTWDvb9bUcf/pub?gid=0&single=true&output=csv";

    function spawnEquipment() {
        if (!document.body.classList.contains('farming-mode')) return;
        const equipment = ['🚜', '🌾', '🌱', '🧺', '🌽', '🌻'];
        const el = document.createElement('div');
        el.className = 'farm-pop';
        el.innerText = equipment[Math.floor(Math.random() * equipment.length)];
        el.style.left = Math.random() * 90 + 'vw';
        el.style.top = Math.random() * 90 + 'vh';
        document.body.appendChild(el);
        setTimeout(() => el.style.opacity = '0.4', 100);
        setTimeout(() => el.style.opacity = '0', 3000);
        setTimeout(() => el.remove(), 4500);
    }

    async function checkTwitchMode() {
        try {
            const res = await fetch(`https://decapi.me/twitch/game/${TWITCH_USER}`); //
            const game = (await res.text()).toLowerCase();
            const body = document.getElementById('main-body');
            const status = document.getElementById('live-status');
            body.className = '';

            if (game.includes("need for speed") || game.includes("racing") || game.includes("driving")) {
                body.classList.add("racing-mode");
                status.innerHTML = `🏎️ Live/Offline: ${game.toUpperCase()} - Police Chase Active`;
            } else if (game.includes("farming") || game.includes("simulator")) {
                body.classList.add("farming-mode");
                status.innerHTML = `🚜 Last Played/Live: ${game.toUpperCase()}`;
                setInterval(spawnEquipment, 5000);
            } else if (game.includes("angler")) {
                body.classList.add("fishing-mode");
                status.innerHTML = "🎣 Theme Active: The Angler";
            } else if (game.includes("hunter") || game.includes("hunting") || game.includes("predator")) {
                body.classList.add("hunting-mode");
                status.innerHTML = "🎯 Theme Active: Hunting Mode";
            } else {
                status.innerHTML = "Real-Time Community Deals";
            }
        } catch (e) { status.innerHTML = "Amazon Affiliate Hub"; }
    }

    async function loadDeals() {
        try {
            const response = await fetch(SHEET_URL);
            const csvData = await response.text();
            const rows = csvData.split('\n').filter(r => r.trim() !== "").slice(1);
            let htmlContent = "";
            const keywords = {
                race: ["racing", "car", "speed", "police", "tire", "wheel", "engine"],
                farm: ["farm", "tractor", "supply", "almanac", "harvest"],
                hunt: ["hunting", "ammo", "gun", "camouflage", "scope"],
                fish: ["fishing", "angler", "water", "boat"]
            };

            rows.forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 3) {
                    let title = cols[0].replace(/"/g, "").trim();
                    let desc = cols[1].replace(/"/g, "").trim();
                    let url = cols[2].replace(/"/g, "").trim();
                    let img = cols[3]?.replace(/"/g, "").trim() || "https://placehold.co/150";
                    let tag = cols[4]?.replace(/"/g, "").trim() || "werewolf3788-20"; //

                    let content = (title + " " + desc).toLowerCase();
                    let isMatch = false;
                    const body = document.getElementById('main-body');
                    
                    if (body.classList.contains('racing-mode')) isMatch = keywords.race.some(k => content.includes(k));
                    if (body.classList.contains('farming-mode')) isMatch = keywords.farm.some(k => content.includes(k));
                    if (body.classList.contains('hunting-mode')) isMatch = keywords.hunt.some(k => content.includes(k));
                    if (body.classList.contains('fishing-mode')) isMatch = keywords.fish.some(k => content.includes(k));

                    let finalUrl = url.includes('?') ? `${url}&tag=${tag}` : `${url}?tag=${tag}`;
                    htmlContent += `
                        <div class="deal-box ${isMatch ? 'match-highlight' : ''}">
                            <div class="deal-image-container"><img src="${img}" alt="${title}"></div>
                            <div class="deal-info">
                                <h2 class="deal-title">${title}</h2>
                                <p class="deal-desc">${desc}</p>
                            </div>
                            <a href="${finalUrl}" target="_blank" class="buy-btn">View Deal</a>
                        </div>`;
                }
            });
            document.getElementById('amazon-deals-target').innerHTML = htmlContent;
        } catch (e) { console.log("Inventory error."); }
    }

    window.onload = async () => {
        await checkTwitchMode();
        loadDeals();
    };
</script>
</body>
</html>
