<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Deals Hub</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            background: #121212;
            transition: background 3s ease-in-out;
            min-height: 100vh;
        }

        #wp-custom-wrapper {
            width: 90%;
            max-width: 1200px;
            margin: 20px auto;
            background: transparent;
            color: #eee;
        }

        #site-header {
            text-align: center; 
            padding: 30px; 
            border-radius: 20px; 
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .deals-grid { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }
        
        .deal-box {
            display: flex; 
            flex-direction: row; 
            align-items: center;
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.12); 
            border-radius: 15px;
            padding: 20px; 
            transition: 0.3s ease;
            overflow: hidden;
        }

        .deal-box:hover { 
            transform: translateY(-3px); 
            border-color: #ff9900; 
            background: rgba(255, 255, 255, 0.12);
        }

        .deal-image-container {
            width: 120px;
            height: 120px;
            margin-right: 20px;
            flex-shrink: 0;
            border-radius: 10px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .deal-image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .deal-info { flex: 1; padding-right: 20px; }
        .deal-title { font-size: 1.2rem; margin: 0 0 8px 0; color: #fff; }
        .deal-desc { font-size: 0.9rem; color: #ccc; margin: 0; }
        
        .buy-btn {
            background: #ff9900; 
            color: #111; 
            text-decoration: none;
            padding: 12px 25px; 
            font-weight: bold; 
            border-radius: 8px; 
            white-space: nowrap;
            transition: background 0.2s;
        }

        .buy-btn:hover { background: #e68a00; }
        
        @media (max-width: 768px) { 
            .deal-box { flex-direction: column; text-align: center; } 
            .deal-image-container { margin: 0 0 15px 0; width: 100%; height: 180px; }
            .deal-info { padding: 0 0 20px 0; } 
        }
    </style>
</head>
<body>

<div id="wp-custom-wrapper">
    <div id="site-header">
        <h1>Amazon Clearance Picks</h1>
        <p>Gainesville 32609 Real-Time Updates</p>
    </div>

    <div class="deals-grid" id="amazon-deals-target">
        <p style="text-align:center;">Synchronizing with inventory...</p>
    </div>
</div>

<script>
    const DEFAULT_ID = "Werewolf3788-20";
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTFygWPIyqmgu02ImqUERdgBLcQ5jPSEgxQuqumbiKOVe4YX7bzawxLBGEi7okVKlak9JTWDvb9bUcf/pub?gid=0&single=true&output=csv";

    async function updateWallpaper() {
        try {
            const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=29.6516&longitude=-82.3248&current_weather=true');
            const data = await res.json();
            const temp = data.current_weather.temperature;
            const code = data.current_weather.weathercode;
            let topColor = "#121212"; 
            if (code >= 1 && code <= 3) topColor = "#1e3a5f";
            if (code >= 51) topColor = "#1a2a3a";
            if (temp > 29) topColor = "#3e1f1f";
            document.body.style.background = `linear-gradient(180deg, ${topColor} 0%, #000 100%)`;
        } catch (e) { console.log("Weather error"); }
    }

    async function loadDeals() {
        try {
            const response = await fetch(SHEET_URL);
            const csvData = await response.text();
            const rows = csvData.split('\n').filter(row => row.trim() !== "");
            const dataRows = rows.slice(1);
            
            let htmlContent = "";

            dataRows.forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                if (cols.length >= 3) {
                    let title = cols[0]?.replace(/"/g, "").trim();
                    let desc = cols[1]?.replace(/"/g, "").trim();
                    let rawUrl = cols[2]?.replace(/"/g, "").trim();
                    let imgUrl = cols[3]?.replace(/"/g, "").trim() || "https://placehold.co/150x150/222/white?text=No+Image";
                    let affiliateId = cols[4]?.replace(/"/g, "").trim() || DEFAULT_ID;

                    if(title && rawUrl) {
                        let affiliateUrl = rawUrl.includes('?') 
                            ? `${rawUrl}&tag=${affiliateId}` 
                            : `${rawUrl}?tag=${affiliateId}`;

                        htmlContent += `
                            <div class="deal-box">
                                <div class="deal-image-container">
                                    <img src="${imgUrl}" alt="${title}" loading="lazy">
                                </div>
                                <div class="deal-info">
                                    <h2 class="deal-title">${title}</h2>
                                    <p class="deal-desc">${desc}</p>
                                </div>
                                <a href="${affiliateUrl}" target="_blank" class="buy-btn">View Deal</a>
                            </div>
                        `;
                    }
                }
            });

            document.getElementById('amazon-deals-target').innerHTML = htmlContent || "<p style='text-align:center;'>Check back soon for new clearance finds!</p>";

        } catch (error) {
            document.getElementById('amazon-deals-target').innerHTML = "<p style='text-align:center;'>Unable to load deals right now.</p>";
        }
    }

    window.onload = () => {
        updateWallpaper();
        loadDeals();
    };
</script>
</body>
</html>
